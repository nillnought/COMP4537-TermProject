<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/register.css">
</head>

<body>
    <div id="main-cont">
        <div id="sign-up-wrapper">
            <div id="title">
                <h1>Forgot Your Password?</h1>
                <p>Enter the email used for your account and we'll send a link to reset your password</p>
            </div>
            <form id="sign-up">
                <div id="form-input-wrap">
                    <input placeholder="Email" class="form-input" id="username" type="email" required>
                </div>
                <button type="button" id="submit-btn">Reset Password</button>
            </form>
        </div>
    </div>
    
</body>
</html>
