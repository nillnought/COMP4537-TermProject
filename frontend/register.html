<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/register.css">
</head>
<body>
    <div id="main-cont">  
        <div id="sign-up-wrapper">
            <form id="sign-up">
                <div id="form-input-wrap">
                    <input placeholder="Username" class="form-input">
                    <input placeholder="Password" class="form-input" type="password">
                </div>
                <button type="submit" id="submit-btn">Submit</button>
                <div id="form-link-wrap">
                    <a class="form-link">Don't have an account?</a>
                    <a class="form-link">Forgot password</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
